apiVersion: v2
name: zerotrust-id-governance
description: |
  ZeroTrust ID Governance - Identity & Access Management Platform.
  Zero Trust アーキテクチャに基づく IAM プラットフォーム。
  認証（JWT RS256）・認可（RBAC）・ネットワーク（NetworkPolicy）の三層セキュリティ。
  Observability: Prometheus + OTEL + Grafana + Loki + Alertmanager の完全スタック。
  Secrets 管理: ESO + Azure Key Vault Workload Identity 統合。
type: application
version: 1.1.0
appVersion: "1.0.0"
