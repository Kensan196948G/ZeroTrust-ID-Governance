# =============================================
# SecretStore テンプレート（本番用）
# externalSecrets.enabled=true の場合のみ作成。
# Azure Key Vault への接続設定を定義する。
# auth.type=workloadIdentity の場合は Pod に
# azure.workload.identity/use: "true" ラベルが必要。
# =============================================
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "zerotrust.fullname" . }}-secret-store
  namespace: {{ include "zerotrust.namespace" . | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
spec:
  provider:
    azurekv:
      authType: {{ .Values.externalSecrets.auth.type | default "WorkloadIdentity" }}
      vaultUrl: {{ .Values.externalSecrets.azureKeyVault.vaultUrl | quote }}
      tenantId: {{ .Values.externalSecrets.azureKeyVault.tenantId | quote }}
      {{- if eq .Values.externalSecrets.auth.type "workloadIdentity" }}
      serviceAccountRef:
        name: {{ .Values.externalSecrets.auth.serviceAccountRef.name }}
        namespace: {{ include "zerotrust.namespace" . | quote }}
      {{- end }}
{{- end }}
