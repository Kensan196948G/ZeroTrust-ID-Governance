# =============================================
# ExternalSecret テンプレート（本番用）
# externalSecrets.enabled=true の場合のみ作成。
# External Secrets Operator が Azure Key Vault から
# 自動同期して zerotrust-secrets Secret を生成する。
# 前提: ESO + SecretStore が事前インストール済みであること。
# =============================================
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "zerotrust.fullname" . }}-external-secret
  namespace: {{ include "zerotrust.namespace" . | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ include "zerotrust.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: zerotrust-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range $k8sKey, $vaultKey := .Values.externalSecrets.secretMapping }}
    - secretKey: {{ $k8sKey }}
      remoteRef:
        key: {{ $vaultKey }}
    {{- end }}
{{- end }}
