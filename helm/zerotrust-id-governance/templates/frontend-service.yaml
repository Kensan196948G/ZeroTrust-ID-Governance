apiVersion: v1
kind: Service
metadata:
  name: {{ include "zerotrust.fullname" . }}-frontend
  namespace: {{ include "zerotrust.namespace" . | quote }}
  labels:
    {{- include "zerotrust.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "zerotrust.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
