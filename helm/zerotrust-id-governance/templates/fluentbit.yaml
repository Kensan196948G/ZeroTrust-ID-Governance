# =============================================
# Fluent Bit ログ収集エージェント（DaemonSet）
# logging.enabled=true の場合のみ作成。
# ノード上の /var/log/containers/*.log を収集し
# Loki HTTP API へ push する。
# =============================================
{{- if .Values.logging.enabled }}
---
# Fluent Bit 設定 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zerotrust.fullname" . }}-fluentbit-config
  namespace: {{ include "zerotrust.namespace" . | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On

    [OUTPUT]
        Name            loki
        Match           *
        Host            {{ include "zerotrust.fullname" . }}-loki
        Port            {{ .Values.logging.loki.service.port }}
        Labels          job=fluentbit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
        Line_Format     json
        Auto_Kubernetes_Labels On

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On
---
# Fluent Bit ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zerotrust.fullname" . }}-fluentbit
  namespace: {{ include "zerotrust.namespace" . | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
---
# Fluent Bit ClusterRole（Pod/Node メタデータ取得用）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zerotrust.fullname" . }}-fluentbit
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
---
# Fluent Bit ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zerotrust.fullname" . }}-fluentbit
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zerotrust.fullname" . }}-fluentbit
subjects:
  - kind: ServiceAccount
    name: {{ include "zerotrust.fullname" . }}-fluentbit
    namespace: {{ include "zerotrust.namespace" . }}
---
# Fluent Bit DaemonSet（各ノードで1Pod）
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "zerotrust.fullname" . }}-fluentbit
  namespace: {{ include "zerotrust.namespace" . | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
spec:
  selector:
    matchLabels:
      {{- include "zerotrust.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fluentbit
  template:
    metadata:
      labels:
        {{- include "zerotrust.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fluentbit
    spec:
      serviceAccountName: {{ include "zerotrust.fullname" . }}-fluentbit
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fluent-bit
          image: "{{ .Values.logging.fluentbit.image.repository }}:{{ .Values.logging.fluentbit.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.logging.fluentbit.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "zerotrust.fullname" . }}-fluentbit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: tmp
          emptyDir: {}
{{- end }}
