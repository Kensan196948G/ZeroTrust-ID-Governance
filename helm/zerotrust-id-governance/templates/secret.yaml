# =============================================
# Secret テンプレート（開発・CI・ステージング用）
# externalSecrets.enabled=false の場合のみ作成。
# 本番環境は externalSecrets.enabled=true にして
# External Secrets Operator 経由で Azure Key Vault から自動同期すること。
# =============================================
{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: zerotrust-secrets
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # ⚠️ 本番では values.yaml に平文で書かず、
  # --set backend.jwtSecretKey=<value> または
  # External Secrets で注入すること
  JWT_SECRET_KEY: "REPLACE_WITH_STRONG_SECRET_KEY_IN_PRODUCTION"
  DATABASE_URL: "postgresql://admin:REPLACE_PASSWORD@{{ .Release.Name }}-postgresql:5432/zerotrust_id"
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379/0"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
  # Azure AD / Entra ID（使用する場合）
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  # Active Directory
  AD_BIND_PASSWORD: ""
  # HengeONE
  HENGEONE_API_TOKEN: ""
{{- end }}