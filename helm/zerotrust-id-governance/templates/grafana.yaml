# =============================================
# Grafana ダッシュボード（開発・ステージング用）
# grafana.enabled=true の場合のみ作成。
# 本番環境では Grafana Cloud または
# Grafana Operator（grafana/grafana Helm chart）を推奨。
# =============================================
{{- if .Values.grafana.enabled }}
---
# Prometheus + Jaeger データソース自動プロビジョニング用 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zerotrust.fullname" . }}-grafana-datasources
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: {{ .Values.grafana.prometheusUrl | quote }}
        isDefault: true
        editable: false
      {{- if .Values.tracing.enabled }}
      - name: Jaeger
        type: jaeger
        access: proxy
        url: {{ .Values.grafana.jaegerUrl | quote }}
        editable: false
      {{- end }}
---
# ZeroTrust ID Governance ダッシュボード定義（HTTP RED メトリクス）
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zerotrust.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
    grafana_dashboard: "1"
data:
  zerotrust-overview.json: |
    {
      "title": "ZeroTrust ID Governance - Overview",
      "uid": "zerotrust-overview",
      "schemaVersion": 36,
      "version": 1,
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{
            "expr": "rate(http_requests_total{job=\"zerotrust-backend\"}[5m])",
            "legendFormat": "{{ "{{" }}method{{ "}}" }} {{ "{{" }}handler{{ "}}" }} {{ "{{" }}status{{ "}}" }}"
          }]
        },
        {
          "id": 2,
          "title": "HTTP Error Rate (%)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [{
            "expr": "rate(http_requests_total{job=\"zerotrust-backend\",status=~\"5..\"}[5m]) / rate(http_requests_total{job=\"zerotrust-backend\"}[5m]) * 100",
            "legendFormat": "Error Rate"
          }]
        },
        {
          "id": 3,
          "title": "HTTP Request Duration P99 (s)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job=\"zerotrust-backend\"}[5m]))",
            "legendFormat": "P99 Latency"
          }]
        },
        {
          "id": 4,
          "title": "Active Requests",
          "type": "stat",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "targets": [{
            "expr": "http_requests_in_progress{job=\"zerotrust-backend\"}",
            "legendFormat": "In-flight"
          }]
        }
      ]
    }
---
# ダッシュボードプロビジョニング設定 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zerotrust.fullname" . }}-grafana-dashboard-provider
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: ZeroTrust Dashboards
        folder: ZeroTrust
        type: file
        disableDeletion: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zerotrust.fullname" . }}-grafana
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zerotrust.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "zerotrust.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.adminPasswordSecretRef.name }}
                  key: {{ .Values.grafana.adminPasswordSecretRef.key }}
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/zerotrust-overview.json"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: datasources
          configMap:
            name: {{ include "zerotrust.fullname" . }}-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: {{ include "zerotrust.fullname" . }}-grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: {{ include "zerotrust.fullname" . }}-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zerotrust.fullname" . }}-grafana
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "zerotrust.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  selector:
    {{- include "zerotrust.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
