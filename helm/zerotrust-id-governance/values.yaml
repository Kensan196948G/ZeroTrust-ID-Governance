# =============================================
# ZeroTrust ID Governance - Helm Values
# =============================================
# このファイルのデフォルト値は本番安全設定です。
# 機密値は Secret で管理し、ここには含めないこと。

# --- バックエンド (FastAPI) ---
backend:
  image:
    repository: ghcr.io/kensan914/zerotrust-id-governance-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8000
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    APP_ENV: production
    ALLOWED_ORIGINS: '["https://your-domain.example.com"]'
    ALLOWED_HOSTS: '["your-domain.example.com"]'
  # 機密値は Secret 参照（値はここに書かない）
  secretRef:
    name: zerotrust-secrets

# --- フロントエンド (Next.js) ---
frontend:
  image:
    repository: ghcr.io/kensan914/zerotrust-id-governance-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_URL: "https://api.your-domain.example.com"
    NEXT_PUBLIC_APP_NAME: "ZeroTrust ID Governance"

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: your-domain.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    - secretName: zerotrust-tls
      hosts:
        - your-domain.example.com

# --- PostgreSQL（本番では外部マネージドDB推奨）---
postgresql:
  enabled: true
  auth:
    database: zerotrust_id
    username: admin
    existingSecret: zerotrust-secrets
    secretKeys:
      adminPasswordKey: POSTGRES_PASSWORD
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# --- Redis ---
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

# --- グローバル設定 ---
global:
  imageRegistry: ""
  imagePullSecrets: []

# --- Pod セキュリティ設定（全 Pod 共通）---
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# --- Service Account ---
serviceAccount:
  create: true
  name: zerotrust-sa
  annotations: {}

# --- Observability ---
# prometheus.io/scrape アノテーションは backend-deployment.yaml に直接定義済み
# Prometheus Operator を使用する場合は以下を有効化
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics

# --- Secrets 管理（External Secrets Operator）---
# enabled: false → secret.yaml に REPLACE_ プレースホルダー Secret を作成（開発・CI用）
# enabled: true  → ExternalSecret CRD 経由で Azure Key Vault から自動同期（本番用）
externalSecrets:
  enabled: false
  azureKeyVault:
    vaultUrl: "https://your-keyvault-name.vault.azure.net/"
    tenantId: "REPLACE_WITH_AZURE_TENANT_ID"
  auth:
    # workloadIdentity: Azure AD Workload Identity（推奨・Managed Identity）
    # servicePrincipal: クライアントシークレット方式
    type: workloadIdentity
    serviceAccountRef:
      name: zerotrust-sa
  # Azure Key Vault からの同期間隔（ISO8601 duration または cron）
  refreshInterval: "1h"
  # Kubernetes Secret キー → Azure Key Vault シークレット名 マッピング
  secretMapping:
    JWT_SECRET_KEY: zerotrust-jwt-secret-key
    DATABASE_URL: zerotrust-database-url
    REDIS_URL: zerotrust-redis-url
    POSTGRES_PASSWORD: zerotrust-postgres-password
    AZURE_TENANT_ID: zerotrust-azure-tenant-id
    AZURE_CLIENT_ID: zerotrust-azure-client-id
    AZURE_CLIENT_SECRET: zerotrust-azure-client-secret
    AD_BIND_PASSWORD: zerotrust-ad-bind-password
    HENGEONE_API_TOKEN: zerotrust-hengeone-api-token

# --- Grafana ダッシュボード（開発・ステージング用）---
# enabled: true → Grafana Deployment + Service を作成（Prometheus データソース自動プロビジョニング）
# 本番環境では Grafana Cloud または Grafana Operator を推奨
grafana:
  enabled: false
  image:
    repository: grafana/grafana
    tag: "11.5.2"
  service:
    port: 3001
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  # admin 認証（本番では zerotrust-secrets から参照）
  adminUser: admin
  adminPasswordSecretRef:
    name: zerotrust-secrets
    key: GRAFANA_ADMIN_PASSWORD
  # Prometheus データソース自動プロビジョニング
  prometheusUrl: "http://prometheus-server:9090"
  # Jaeger データソース（tracing.enabled=true の場合のみ有効）
  jaegerUrl: "http://zerotrust-id-governance-jaeger-query:16686"
  # Loki データソース（logging.enabled=true の場合のみ有効）
  lokiUrl: "http://zerotrust-id-governance-loki:3100"

# --- ログ収集（Loki + Fluent Bit）---
# enabled: false → ログ収集無効（開発・CI用）
# enabled: true  → Loki + Fluent Bit で構造化ログ収集（本番用）
logging:
  enabled: false
  # Loki（ログストレージ）
  loki:
    image:
      repository: grafana/loki
      tag: "3.4.2"
    service:
      port: 3100
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    persistence:
      enabled: false
      size: 5Gi
  # Fluent Bit（ログ収集エージェント）
  fluentbit:
    image:
      repository: fluent/fluent-bit
      tag: "3.3.6"
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

# --- OpenTelemetry 分散トレーシング ---
# enabled: false → OTEL_SDK_DISABLED=true（開発・CI用・トレース無効）
# enabled: true  → Jaeger OTLP エンドポイントへトレース送信（本番用）
tracing:
  enabled: false
  # Jaeger OTLP gRPC エンドポイント
  # Kubernetes 内部 DNS: http://<release>-jaeger-collector:4317
  otlpEndpoint: "http://zerotrust-id-governance-jaeger-collector:4317"
  # Jaeger All-in-One（開発・ステージング用）
  jaeger:
    enabled: false
    image:
      repository: jaegertracing/all-in-one
      tag: "1.62"
    service:
      queryPort: 16686
      collectorPort: 4317

# --- アラート通知（Alertmanager）---
# enabled: false → アラート通知無効（開発・CI用）
# enabled: true  → Alertmanager で Slack/Teams 通知（本番用）
alerting:
  enabled: false
  alertmanager:
    image:
      repository: prom/alertmanager
      tag: "v0.27.0"
    service:
      port: 9093
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
    # Slack 通知設定（Secret 参照）
    slack:
      enabled: false
      channel: "#zerotrust-alerts"
      # Webhook URL は zerotrust-secrets から参照
      webhookSecretRef:
        name: zerotrust-secrets
        key: SLACK_WEBHOOK_URL
    # Microsoft Teams 通知設定
    teams:
      enabled: false
      # Webhook URL は zerotrust-secrets から参照
      webhookSecretRef:
        name: zerotrust-secrets
        key: TEAMS_WEBHOOK_URL
