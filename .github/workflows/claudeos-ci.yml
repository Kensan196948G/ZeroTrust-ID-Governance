name: 🔐 ClaudeOS CI - ZeroTrust ID Governance

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ===================================
  # バックエンド CI
  # ===================================
  backend-ci:
    name: 🔧 Backend (FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zerotrust_id_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🔍 Lint (ruff)
        working-directory: backend
        run: ruff check . --output-format=github

      - name: 🔍 Type check (mypy)
        working-directory: backend
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      - name: 🧪 Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://admin:testpassword@localhost:5432/zerotrust_id_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          APP_ENV: test
        run: |
          pytest tests/ --cov-report=xml

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ===================================
  # フロントエンド CI
  # ===================================
  frontend-ci:
    name: 🎨 Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm install

      - name: 🔍 Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: 🔍 Type check
        working-directory: frontend
        run: npm run type-check

      - name: 🏗️ Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ===================================
  # セキュリティスキャン
  # ===================================
  security-scan:
    name: 🔴 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret,vuln"
          severity: "HIGH,CRITICAL"
          format: "table"
        continue-on-error: true

      - name: 🔐 Python safety check
        run: |
          pip install safety
          safety check -r backend/requirements.txt || true
        continue-on-error: true

  # ===================================
  # API E2E テスト（Newman）
  # ===================================
  api-e2e:
    name: "\U0001F517 API E2E (Newman)"
    needs: [backend-ci]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zerotrust_id_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F40D Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: "\U0001F4E6 Install Python dependencies"
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: "\U0001F680 Start backend server"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://admin:testpassword@localhost:5432/zerotrust_id_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: e2e-test-secret-key-for-newman
          APP_ENV: test
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
          ALLOWED_HOSTS: '["localhost", "127.0.0.1", "testserver"]'
        run: |
          alembic upgrade head
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: "\U0001F7E2 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "\U0001F4E6 Install Newman"
        run: npm install -g newman newman-reporter-junit

      - name: "\U0001F9EA Run Newman E2E tests"
        run: |
          newman run backend/tests/e2e/zerotrust_api_collection.json \
            --environment backend/tests/e2e/newman_environment.json \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml \
            --timeout-request 10000

      - name: "\U0001F4CA Upload Newman results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.xml

  # ===================================
  # フロントエンド E2E テスト（Playwright）
  # ===================================
  frontend-e2e:
    name: "\U0001F3AD Frontend E2E (Playwright)"
    needs: [frontend-ci]
    runs-on: ubuntu-latest

    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F7E2 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "\U0001F4E6 Install frontend dependencies"
        working-directory: frontend
        run: npm install

      - name: "\U0001F3AD Install Playwright browsers"
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: "\U0001F3D7 Build Next.js"
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: "\U0001F680 Start Next.js server"
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          PORT: "3000"
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Frontend server is ready"
              break
            fi
            echo "Waiting for frontend... ($i)"
            sleep 1
          done

      - name: "\U0001F9EA Run Playwright E2E tests"
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          CI: "true"
        run: npx playwright test --reporter=junit,list

      - name: "\U0001F4CA Upload Playwright results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            frontend/playwright-results.xml
            frontend/playwright-report/

  # ===================================
  # CI 結果判定（STABLE 評価用）
  # ===================================
  ci-gate:
    name: "\u2705 CI Gate (STABLE\u5224\u5b9a)"
    needs: [backend-ci, frontend-ci, security-scan, api-e2e, frontend-e2e]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: "\u5224\u5b9a"
        env:
          BACKEND_RESULT: ${{ needs.backend-ci.result }}
          FRONTEND_RESULT: ${{ needs.frontend-ci.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          API_E2E_RESULT: ${{ needs.api-e2e.result }}
          FRONTEND_E2E_RESULT: ${{ needs.frontend-e2e.result }}
        run: |
          echo "Backend CI:   $BACKEND_RESULT"
          echo "Frontend CI:  $FRONTEND_RESULT"
          echo "Security:     $SECURITY_RESULT"
          echo "API E2E:      $API_E2E_RESULT"
          echo "Frontend E2E: $FRONTEND_E2E_RESULT"

          if [[ "$BACKEND_RESULT" == "success" && \
                "$FRONTEND_RESULT" == "success" && \
                "$API_E2E_RESULT" == "success" && \
                "$FRONTEND_E2E_RESULT" == "success" ]]; then
            echo "CI PASSED - STABLE (E2E all passed)"
            exit 0
          else
            echo "CI FAILED - repair needed"
            exit 1
          fi

      - name: "CI\u5931\u6557\u901a\u77e5"
        if: failure()
        run: |
          echo "CI_FAILED=true" >> "$GITHUB_ENV"
          echo "Auto Repair Loop trigger required"
